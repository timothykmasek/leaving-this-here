<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>according to</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 100%;
        height: 100%;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #faf8f3 0%, #f5f1e8 100%);
        overflow-x: hidden;
      }

      .header {
        padding: 40px 20px 20px;
        text-align: center;
      }

      .logo {
        font-size: 28px;
        font-weight: 300;
        color: #1d1d1f;
        letter-spacing: -0.5px;
      }

      .logo .mark {
        font-size: 24px;
        margin-right: 8px;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
        padding: 20px 0;
      }

      .card {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(20, 20, 30, 0.08);
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .card:hover {
        box-shadow: 0 8px 24px rgba(20, 20, 30, 0.12);
        transform: translateY(-2px);
      }

      .card-image {
        width: 100%;
        height: 160px;
        background: linear-gradient(135deg, #f0f0f0 0%, #e8e8e8 100%);
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .card-image.no-image {
        background: linear-gradient(135deg, #f5f1e8 0%, #ede8df 100%);
        font-size: 48px;
      }

      .card-content {
        padding: 12px;
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .card-title {
        font-size: 14px;
        font-weight: 600;
        color: #1d1d1f;
        line-height: 1.4;
        margin-bottom: 8px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .card-url {
        font-size: 12px;
        color: #86868b;
        line-height: 1.3;
        display: -webkit-box;
        -webkit-line-clamp: 1;
        -webkit-box-orient: vertical;
        overflow: hidden;
        margin-top: auto;
      }

      .loading {
        text-align: center;
        padding: 60px 20px;
        color: #86868b;
      }

      .spinner {
        display: inline-block;
        width: 32px;
        height: 32px;
        border: 3px solid #e8e8e8;
        border-top-color: #f0653f;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 16px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .empty {
        text-align: center;
        padding: 80px 20px;
        color: #86868b;
      }

      .empty-title {
        font-size: 18px;
        margin-bottom: 8px;
      }

      .error {
        text-align: center;
        padding: 60px 20px;
        color: #d23f3f;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">
        <span class="mark">"</span>according to
      </div>
    </div>

    <div class="container">
      <div id="app">
        <div class="loading">
          <div class="spinner"></div>
          <p>loading your finds…</p>
        </div>
      </div>
    </div>

    <script type="module" src="newtab.js"></script>
  </body>
</html>
