<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="app">
      <!-- Loading -->
      <section id="view-loading" class="view">
        <p class="muted center">loading…</p>
      </section>

      <!-- Signed out -->
      <section id="view-signin" class="view hidden">
        <div class="brand">&ldquo; according to</div>
        <p class="muted">save anything you find — one click, filed to your page.</p>
        <button id="btn-signin" class="primary">continue with google</button>
        <p id="signin-hint" class="hint hidden"></p>
      </section>

      <!-- Signed in (rarely seen — the icon click saves directly) -->
      <section id="view-ready" class="view hidden">
        <div class="topbar">
          <span class="brand-sm">&ldquo; according to</span>
          <button id="btn-signout" class="link">sign out</button>
        </div>
        <p class="muted">
          you’re all set. click the according to icon on any page to save it
          instantly — then add it to a list right on the page.
        </p>
        <p class="muted small">
          tip: right-click a page, image, or highlighted quote to save just that.
        </p>
      </section>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
