<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="app">
      <!-- Loading -->
      <section id="view-loading" class="view">
        <p class="muted center">loading…</p>
      </section>

      <!-- Signed out -->
      <section id="view-signin" class="view hidden">
        <img class="logo" src="icons/bulletin-logo.png" alt="Bulletin" />
        <p class="muted">Save anything you find — one click, filed to your page.</p>

        <form id="form-email" autocomplete="on">
          <input id="email" class="field" type="email" name="email"
            placeholder="email" autocomplete="username" required />
          <input id="password" class="field" type="password" name="password"
            placeholder="password" autocomplete="current-password" required />
          <button id="btn-email-signin" class="primary" type="submit">Sign in</button>
        </form>

        <div class="divider"><span>or</span></div>

        <button id="btn-signin" class="primary ghost" type="button">Continue with Google</button>
        <p id="signin-hint" class="hint hidden"></p>
        <p class="muted small signup-line">New to Bulletin? <a id="link-create" class="link-inline" href="#">Create an account →</a></p>
      </section>

      <!-- Signed in (rarely seen — the icon click saves directly) -->
      <section id="view-ready" class="view hidden">
        <div class="topbar">
          <img class="logo-sm" src="icons/bulletin-logo.png" alt="Bulletin" />
          <button id="btn-signout" class="link">sign out</button>
        </div>
        <p class="muted">
          you’re all set — click the Bulletin icon on any page to save it instantly.
        </p>
      </section>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
